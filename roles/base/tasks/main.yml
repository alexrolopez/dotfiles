- name: Add OpenTofu GPG key
  ansible.builtin.apt_key:
    url: https://get.opentofu.org/opentofu.gpg
    state: present
  when: ansible_facts['os_family'] == "Debian"
  become: yes

- name: Add OpenTofu repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64] https://packages.opentofu.org/opentofu/tofu/any/ any main"
    state: present
  when: ansible_facts['os_family'] == "Debian"
  become: yes

- name: Add apt redis key
  ansible.builtin.apt_key:
    url: https://packages.redis.io/gpg
    state: present
  when: ansible_facts['os_family'] == "Debian"
  become: yes

- name: Add apt redis repository
  ansible.builtin.apt_repository:
    repo: "deb https://packages.redis.io/deb {{ ansible_facts['distribution_release'] }} main"
    state: present
  when: ansible_facts['os_family'] == "Debian"
  become: yes

- name: Add apt docker key
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present
  when: ansible_facts['os_family'] == "Debian"
  become: yes

- name: Add apt docker repository
  ansible.builtin.apt_repository:
    repo: "deb https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable"
    state: present
  when: ansible_facts['os_family'] == "Debian"
  become: yes

