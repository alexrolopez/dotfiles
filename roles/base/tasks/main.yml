- name: Check if colima default instance exists
  shell: colima list -j | grep -q '"name":"default"'
  register: colima_instance
  failed_when: false
  changed_when: false
  when: ansible_facts['os_family'] == "Darwin"

- name: Create colima instance with vz backend
  shell: colima start --vm-type vz --vz-rosetta --mount-type virtiofs
  when: ansible_facts['os_family'] == "Darwin" and colima_instance.rc != 0

- name: Check if colima is already running
  shell: colima list -j | grep -q '"status":"Running"'
  register: colima_status
  failed_when: false
  changed_when: false
  when: ansible_facts['os_family'] == "Darwin" and colima_instance.rc == 0

- name: Start colima if not already running
  shell: colima start
  when: ansible_facts['os_family'] == "Darwin" and colima_instance.rc == 0 and colima_status.rc != 0

- name: Enable colima as a service to survive reboots
  shell: brew services start colima
  when: ansible_facts['os_family'] == "Darwin"

- name: Create Docker CLI plugins directory if not present
  file:
    path: "{{ ansible_facts.env.HOME }}/.docker/cli-plugins"
    state: directory
    mode: '0755'
  when: ansible_facts['os_family'] == "Darwin"

- name: Symlink Docker Buildx plugin
  file:
    src: "{{ lookup('pipe', 'brew --prefix') }}/opt/docker-buildx/bin/docker-buildx"
    dest: "{{ ansible_facts.env.HOME }}/.docker/cli-plugins/docker-buildx"
    state: link
    force: yes
  when: ansible_facts['os_family'] == "Darwin"

- name: Symlink Docker Compose plugin
  file:
    src: "{{ lookup('pipe', 'brew --prefix') }}/opt/docker-compose/bin/docker-compose"
    dest: "{{ ansible_facts.env.HOME }}/.docker/cli-plugins/docker-compose"
    state: link
    force: yes
  when: ansible_facts['os_family'] == "Darwin"

- name: Install task on Debian
  apt:
    deb: https://github.com/go-task/task/releases/latest/download/task_linux_amd64.deb
  when: ansible_facts['os_family'] == "Debian"
  become: yes

- name: Install aws-vault on Debian
  get_url:
    url: https://github.com/99designs/aws-vault/releases/latest/download/aws-vault-linux-amd64
    dest: /usr/local/bin/aws-vault
    mode: 0755
  when: ansible_facts['os_family'] == "Debian"
  become: yes

- name: Install mise on Debian
  get_url:
    url: https://github.com/jdx/mise/releases/latest/download/mise-linux-x64
    dest: /usr/local/bin/mise
    mode: 0755
  when: ansible_facts['os_family'] == "Debian"
  become: yes

- name: Add current user to groups on Debian
  user:
    name: "{{ansible_facts.env.USER}}"
    groups: sudo,docker
    append: yes
  when: ansible_facts['os_family'] == "Debian"
  become: yes
